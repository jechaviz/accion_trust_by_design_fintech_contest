metadata:
  name: accion-trust-submission-dry-run
  description: Verify local Accion Trust by Design submission scaffold without submitting external forms.

variables:
  PROJECT_DIR: "${ROOT_PLAYBOOK_DIR}/../.."
  SUBMISSION_DIR: "${PROJECT_DIR}/submission"
  APPLICATION_DRAFT: "${PROJECT_DIR}/application/application_draft.md"
  PAYLOAD_TEMPLATE: "${SUBMISSION_DIR}/accion_form_payload.template.json"
  FORM_MAP: "${SUBMISSION_DIR}/form_map.yml"
  EVIDENCE_DIR: "${PROJECT_DIR}/automation/evidence/dry-run"
  TRACE_PATH: "${EVIDENCE_DIR}/accion_submission_dry_run_trace.jsonl"
  OFFICIAL_FORM_URL: "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=dYC7MDl-NUCfCAeE2OWLfks5jZn3HotAqHHb7TW_v01UNEpIMTE4VUM1SFVNTUxVTzhWNlROMk1OTC4u"

steps:
  prod:
    - action: FS.EnsureDir
      params:
        path: "${EVIDENCE_DIR}"

    - action: Trace.Event
      params:
        path: "${TRACE_PATH}"
        name: "dry_run_start"
        message: "Accion Trust by Design submission scaffold dry-run started."
        data:
          dry_run: true
          final_submit_allowed: false
          form_url: "${OFFICIAL_FORM_URL}"

    - action: FS.Exists
      register: application_draft_exists
      params:
        path: "${APPLICATION_DRAFT}"

    - action: FS.Exists
      register: payload_template_exists
      params:
        path: "${PAYLOAD_TEMPLATE}"

    - action: FS.Exists
      register: form_map_exists
      params:
        path: "${FORM_MAP}"

    - action: Trace.Event
      params:
        path: "${TRACE_PATH}"
        name: "scaffold_file_check"
        message: "Checked application draft, payload template, and form map."
        data:
          application_draft_exists: "${application_draft_exists}"
          payload_template_exists: "${payload_template_exists}"
          form_map_exists: "${form_map_exists}"

    - action: Browser.Open
      register: browser_contract
      params:
        mock: true
        url: "${OFFICIAL_FORM_URL}"

    - action: Trace.Event
      params:
        path: "${TRACE_PATH}"
        name: "operator_handoff_policy"
        message: "Legal authority, live partner data, review, and final submit remain operator-only gates."
        data:
          browser_contract_opened: "${browser_contract.opened}"
          credentials_allowed_in_payload: false
          final_submit_allowed: false
          partner_authority_required: true

  debug:
    - action: Note
      params:
        text: "Accion submission dry-run playbook is parseable."
